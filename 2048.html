<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
            font-family: Arial, Helvetica, sans-serif;
            touch-action: none;
        }
        h1 { margin: 10px 0; color: #2c3e50; }
        #scores { display: flex; gap: 12px; margin-bottom: 12px; }
        .scorebox {
            background: #2c3e50; color: #ecf0f1; border-radius: 6px;
            padding: 6px 18px; text-align: center; min-width: 70px;
        }
        .scorebox small { display: block; font-size: 11px; color: #95a5a6; }
        .scorebox b { font-size: 20px; }
        canvas { background-color: #2c3e50; border-radius: 8px; max-width: 95vw; }
        button {
            margin-top: 12px; padding: 8px 20px; font-size: 15px;
            background: #3498db; color: #fff; border: none; border-radius: 6px; cursor: pointer;
        }
        p { color: #7f8c8d; }
    </style>
</head>
<body>
    <h1>2048</h1>
    <div id="scores">
        <div class="scorebox"><small>SCORE</small><b id="score">0</b></div>
        <div class="scorebox"><small>BEST</small><b id="best">0</b></div>
    </div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <button id="newGame">New Game</button>
    <p>Arrow keys or swipe to slide tiles.</p>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const N = 4, PAD = 10;
        const CELL = (canvas.width - PAD * (N + 1)) / N;

        const TILE_COLORS = {
            2: '#eee4da', 4: '#ede0c8', 8: '#f2b179', 16: '#f59563',
            32: '#f67c5f', 64: '#f65e3b', 128: '#edcf72', 256: '#edcc61',
            512: '#edc850', 1024: '#edc53f', 2048: '#edc22e',
        };

        let grid, score, won, over;
        let best = Number(localStorage.getItem('2048Best') || 0);

        function newGame() {
            grid = Array.from({ length: N }, () => Array(N).fill(0));
            score = 0;
            won = false;
            over = false;
            addTile();
            addTile();
            draw();
        }

        function addTile() {
            const empty = [];
            grid.forEach((row, y) => row.forEach((v, x) => { if (!v) empty.push([y, x]); }));
            if (!empty.length) return;
            const [y, x] = empty[Math.floor(Math.random() * empty.length)];
            grid[y][x] = Math.random() < 0.9 ? 2 : 4;
        }

        // Slide+merge one row to the left; returns [newRow, gained, moved]
        function slideRow(row) {
            const tiles = row.filter(v => v);
            let gained = 0;
            for (let i = 0; i < tiles.length - 1; i++) {
                if (tiles[i] === tiles[i + 1]) {
                    tiles[i] *= 2;
                    gained += tiles[i];
                    if (tiles[i] === 2048) won = true;
                    tiles.splice(i + 1, 1);
                }
            }
            while (tiles.length < N) tiles.push(0);
            const moved = tiles.some((v, i) => v !== row[i]);
            return [tiles, gained, moved];
        }

        function transpose(g) { return g[0].map((_, i) => g.map(row => row[i])); }
        function reverseRows(g) { return g.map(row => row.slice().reverse()); }

        function move(dir) {
            if (over) return;
            let g = grid;
            if (dir === 'up') g = transpose(g);
            else if (dir === 'down') g = reverseRows(transpose(g));
            else if (dir === 'right') g = reverseRows(g);

            let anyMoved = false, gainedTotal = 0;
            g = g.map(row => {
                const [newRow, gained, moved] = slideRow(row);
                if (moved) anyMoved = true;
                gainedTotal += gained;
                return newRow;
            });

            if (dir === 'up') g = transpose(g);
            else if (dir === 'down') g = transpose(reverseRows(g));
            else if (dir === 'right') g = reverseRows(g);

            if (!anyMoved) return;
            grid = g;
            score += gainedTotal;
            if (score > best) {
                best = score;
                localStorage.setItem('2048Best', best);
            }
            addTile();
            if (!hasMoves()) over = true;
            draw();
        }

        function hasMoves() {
            for (let y = 0; y < N; y++) {
                for (let x = 0; x < N; x++) {
                    if (!grid[y][x]) return true;
                    if (x < N - 1 && grid[y][x] === grid[y][x + 1]) return true;
                    if (y < N - 1 && grid[y][x] === grid[y + 1][x]) return true;
                }
            }
            return false;
        }

        function roundRect(x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.arcTo(x + w, y, x + w, y + h, r);
            ctx.arcTo(x + w, y + h, x, y + h, r);
            ctx.arcTo(x, y + h, x, y, r);
            ctx.arcTo(x, y, x + w, y, r);
            ctx.fill();
        }

        function draw() {
            document.getElementById('score').textContent = score;
            document.getElementById('best').textContent = best;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let y = 0; y < N; y++) {
                for (let x = 0; x < N; x++) {
                    const px = PAD + x * (CELL + PAD);
                    const py = PAD + y * (CELL + PAD);
                    const v = grid[y][x];
                    ctx.fillStyle = v ? (TILE_COLORS[v] || '#3c3a32') : '#34495e';
                    roundRect(px, py, CELL, CELL, 8);
                    if (v) {
                        ctx.fillStyle = v <= 4 ? '#776e65' : '#f9f6f2';
                        ctx.font = 'bold ' + (v < 100 ? 40 : v < 1000 ? 32 : 26) + 'px Arial';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(v, px + CELL / 2, py + CELL / 2 + 2);
                    }
                }
            }

            if (over || won) {
                ctx.fillStyle = won ? 'rgba(237,194,46,0.75)' : 'rgba(0,0,0,0.55)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#fff';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.font = 'bold 42px Arial';
                ctx.fillText(won ? 'You win!' : 'Game over', canvas.width / 2, canvas.height / 2 - 15);
                ctx.font = '18px Arial';
                ctx.fillText(won ? 'Keep going or start a new game' : 'Press New Game to try again',
                             canvas.width / 2, canvas.height / 2 + 25);
                won = false; // let the player keep going after the win screen
            }
        }

        document.addEventListener('keydown', e => {
            const dirs = { ArrowLeft: 'left', ArrowRight: 'right', ArrowUp: 'up', ArrowDown: 'down' };
            if (dirs[e.key]) {
                e.preventDefault();
                move(dirs[e.key]);
            }
        });

        let touchX = 0, touchY = 0;
        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            touchX = e.touches[0].clientX;
            touchY = e.touches[0].clientY;
        });
        canvas.addEventListener('touchend', e => {
            e.preventDefault();
            const dx = e.changedTouches[0].clientX - touchX;
            const dy = e.changedTouches[0].clientY - touchY;
            if (Math.max(Math.abs(dx), Math.abs(dy)) < 25) return;
            if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? 'right' : 'left');
            else move(dy > 0 ? 'down' : 'up');
        });

        document.getElementById('newGame').addEventListener('click', newGame);
        newGame();
    </script>
</body>
</html>
