<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Note Reading Trainer</title>
<style>
    :root {
        --ink: #2c3e50;
        --paper: #f4f4f9;
        --accent: #2c3e50;
        --good: #27ae60;
        --bad: #e74c3c;
    }
    * { box-sizing: border-box; }
    body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        background: var(--paper);
        font-family: Arial, Helvetica, sans-serif;
        color: var(--ink);
        -webkit-tap-highlight-color: transparent;
    }
    h1 { margin: 24px 0 2px; font-size: 26px; }
    p.sub { color: #7f8c8d; margin: 0 0 14px; font-size: 14px; }

    .pills { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
    .pills button {
        border: 2px solid var(--accent);
        background: #fff;
        color: var(--accent);
        border-radius: 20px;
        padding: 6px 16px;
        font-size: 14px;
        cursor: pointer;
        transition: all .12s;
    }
    .pills button.active { background: var(--accent); color: #fff; }

    .checks { display: flex; gap: 18px; margin-bottom: 12px; flex-wrap: wrap; justify-content: center; }
    label.chk { font-size: 13px; color: #7f8c8d; display: flex; align-items: center; gap: 6px; cursor: pointer; }

    .stage {
        position: relative;
        background: #fff;
        border-radius: 14px;
        box-shadow: 0 6px 20px rgba(44,62,80,.12);
        padding: 10px 20px 16px;
        width: 360px;
        max-width: 92vw;
    }
    .stage svg { width: 100%; height: auto; display: block; }

    .clef-label { text-align: center; color: #95a5a6; font-size: 13px; margin: 2px 0 0; letter-spacing: .5px; }

    .replay {
        position: absolute;
        top: 12px; right: 12px;
        border: none;
        background: #ecf0f1;
        color: var(--accent);
        border-radius: 8px;
        padding: 6px 10px;
        font-size: 15px;
        cursor: pointer;
        transition: background .12s;
    }
    .replay:hover { background: #dfe6e9; }

    .feedback { text-align: center; height: 26px; font-size: 18px; font-weight: bold; margin: 8px 0 4px; }
    .feedback.good { color: var(--good); }
    .feedback.bad { color: var(--bad); }

    .keys { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; width: 360px; max-width: 92vw; margin-top: 6px; }
    .keys button {
        border: none;
        background: var(--accent);
        color: #ecf0f1;
        border-radius: 8px;
        padding: 16px 0;
        font-size: 20px;
        font-weight: bold;
        cursor: pointer;
        transition: transform .1s, background .1s;
    }
    .keys button:hover { transform: translateY(-2px); }
    .keys button:active { transform: translateY(0); }
    .keys button.flash-good { background: var(--good); }
    .keys button.flash-bad { background: var(--bad); }
    .keys button:disabled { opacity: .55; cursor: default; transform: none; }

    .stats { display: flex; gap: 26px; margin: 16px 0 4px; font-size: 14px; color: #7f8c8d; }
    .stats b { color: var(--ink); font-size: 18px; }
    .stats .col { text-align: center; }

    .reset { background: none; border: none; color: #b0b8bf; font-size: 12px; cursor: pointer; text-decoration: underline; }
    .reset:hover { color: var(--bad); }

    .foot { margin: 6px 0 30px; font-size: 12px; color: #b0b8bf; text-align: center; padding: 0 16px; }
    a.back { position: fixed; top: 14px; left: 16px; color: #95a5a6; text-decoration: none; font-size: 14px; }
    a.back:hover { color: var(--ink); }
</style>
</head>
<body>
    <a class="back" href="index.html">← games</a>
    <h1>🎼 Note Reading Trainer</h1>
    <p class="sub">Name the note. No timer — take your time.</p>

    <div class="pills" id="modes">
        <button data-mode="treble">Treble 𝄞</button>
        <button data-mode="bass">Bass 𝄢</button>
        <button data-mode="both" class="active">Both</button>
    </div>

    <div class="pills" id="diffs">
        <button data-diff="staff" class="active">Staff only</button>
        <button data-diff="ledger">+ Ledger lines</button>
    </div>

    <div class="checks">
        <label class="chk"><input type="checkbox" id="hintChk"> Learning mode — reveal the name</label>
        <label class="chk"><input type="checkbox" id="soundChk" checked> 🔊 Play the pitch</label>
    </div>

    <div class="stage">
        <button class="replay" id="replayBtn" title="Hear this note">🔊</button>
        <svg id="staff" viewBox="0 0 300 220" preserveAspectRatio="xMidYMid meet"></svg>
        <div class="clef-label" id="clefLabel"></div>
    </div>

    <div class="feedback" id="feedback">&nbsp;</div>

    <div class="keys" id="keys"></div>

    <div class="stats">
        <div class="col"><b id="sAcc">—</b><br>accuracy</div>
        <div class="col"><b id="sStreak">0</b><br>streak</div>
        <div class="col"><b id="sBest">0</b><br>best</div>
        <div class="col"><b id="sTotal">0</b><br>tried</div>
    </div>
    <button class="reset" id="resetBtn">reset progress</button>

    <p class="foot">Tip: press <b>A–G</b> to answer. Missed notes come back more often. The staff adds ledger lines above and below when needed.</p>

<script>
(() => {
    "use strict";

    const LETTERS = ["A","B","C","D","E","F","G"];
    const C_SCALE = ["C","D","E","F","G","A","B"];        // for octave math
    const SEMIS = { C:0, D:2, E:4, F:5, G:7, A:9, B:11 };  // for pitch

    // Staff geometry (in SVG user units)
    const LEFT = 20, RIGHT = 280;      // staff line span
    const STAFF_TOP = 70;              // y of top staff line
    const GAP = 16;                    // distance between staff lines
    const HALF = GAP / 2;              // one diatonic step
    const BOTTOM = STAFF_TOP + 4 * GAP;// y of bottom staff line
    const NOTE_X = 190;                // x of the notehead

    // A "position" d: 0 = bottom staff line, +1 per diatonic step upward.
    // Even d = a line, odd d = a space. Lines are at d = 0,2,4,6,8.
    const yFor = d => BOTTOM - d * HALF;

    // Bottom-line letter per clef, and starting octave, so we can name any position.
    // treble bottom line = E4 ; bass bottom line = G2.
    const CLEFS = {
        treble: { glyph: "𝄞", glyphSize: 96, glyphY: STAFF_TOP + 3.0 * GAP, bottomLetter: "E", bottomOctave: 4, name: "Treble clef" },
        bass:   { glyph: "𝄢", glyphSize: 78, glyphY: STAFF_TOP + 1.55 * GAP, bottomLetter: "G", bottomOctave: 2, name: "Bass clef" }
    };

    // Difficulty → range of d. "staff" keeps everything on the staff (d 0..8);
    // "ledger" opens a couple ledger positions each way.
    const RANGES = { staff: [0, 8], ledger: [-3, 11] };

    // Full note (letter + octave) for a clef position, so we can name and sound it.
    function noteInfo(clef, d) {
        const c = CLEFS[clef];
        const abs = c.bottomOctave * 7 + C_SCALE.indexOf(c.bottomLetter) + d;
        const octave = Math.floor(abs / 7);
        const letter = C_SCALE[((abs % 7) + 7) % 7];
        return { letter, octave, midi: (octave + 1) * 12 + SEMIS[letter] };
    }
    const letterAt = (clef, d) => noteInfo(clef, d).letter;

    const svg = document.getElementById("staff");
    const SVGNS = "http://www.w3.org/2000/svg";
    function el(name, attrs, text) {
        const n = document.createElementNS(SVGNS, name);
        for (const k in attrs) n.setAttribute(k, attrs[k]);
        if (text != null) n.textContent = text;
        return n;
    }

    // ---- Persistent state (localStorage) --------------------------------
    const SKEY = "noteread.v1";
    const DEFAULT_STATE = { correct: 0, total: 0, streak: 0, best: 0, weights: {} };
    function loadState() {
        try { return Object.assign({}, DEFAULT_STATE, JSON.parse(localStorage.getItem(SKEY)) || {}); }
        catch (e) { return Object.assign({}, DEFAULT_STATE); }
    }
    function saveState() { try { localStorage.setItem(SKEY, JSON.stringify(state)); } catch (e) {} }
    let state = loadState();

    let mode = "both";
    let difficulty = "staff";
    let currentClef = "treble";
    let currentD = 0;
    let answered = false;

    // ---- Audio (WebAudio pitch playback) --------------------------------
    let audioCtx = null;
    function playPitch(midi) {
        if (!document.getElementById("soundChk").checked) return;
        try {
            audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === "suspended") audioCtx.resume();
            const freq = 440 * Math.pow(2, (midi - 69) / 12);
            const t = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = "triangle";
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.0001, t);
            gain.gain.linearRampToValueAtTime(0.25, t + 0.02);
            gain.gain.exponentialRampToValueAtTime(0.0008, t + 0.9);
            osc.connect(gain).connect(audioCtx.destination);
            osc.start(t);
            osc.stop(t + 0.95);
        } catch (e) { /* audio unavailable — silent */ }
    }
    function playCurrent() { playPitch(noteInfo(currentClef, currentD).midi); }

    // ---- Adaptive note selection ----------------------------------------
    const posKey = (clef, d) => clef + ":" + d;
    function weightFor(clef, d) { return state.weights[posKey(clef, d)] || 1; }
    function bumpWeight(clef, d, delta) {
        const k = posKey(clef, d);
        state.weights[k] = Math.max(1, Math.min(12, (state.weights[k] || 1) + delta));
    }
    function pickPosition(clef) {
        const [lo, hi] = RANGES[difficulty];
        const cands = [];
        for (let d = lo; d <= hi; d++) {
            if (clef === currentClef && d === currentD) continue; // avoid instant repeat
            cands.push({ d, w: weightFor(clef, d) });
        }
        let total = cands.reduce((s, c) => s + c.w, 0);
        let r = Math.random() * total;
        for (const c of cands) { r -= c.w; if (r <= 0) return c.d; }
        return cands[cands.length - 1].d;
    }

    // ---- Drawing --------------------------------------------------------
    function drawStaff(clef, d, reveal) {
        svg.innerHTML = "";

        for (let i = 0; i < 5; i++) {
            const y = STAFF_TOP + i * GAP;
            svg.appendChild(el("line", { x1: LEFT, y1: y, x2: RIGHT, y2: y, stroke: "#2c3e50", "stroke-width": 1.4 }));
        }

        const c = CLEFS[clef];
        svg.appendChild(el("text", { x: LEFT + 6, y: c.glyphY, "font-size": c.glyphSize,
            "font-family": "'Bravura','Noto Music','Apple Symbols','Segoe UI Symbol',serif", fill: "#2c3e50" }, c.glyph));

        const ledgerW = 14;
        if (d < 0) {
            for (let dd = -2; dd >= d; dd -= 2)
                svg.appendChild(el("line", { x1: NOTE_X - ledgerW, y1: yFor(dd), x2: NOTE_X + ledgerW, y2: yFor(dd), stroke: "#2c3e50", "stroke-width": 1.4 }));
        } else if (d > 8) {
            for (let dd = 10; dd <= d; dd += 2)
                svg.appendChild(el("line", { x1: NOTE_X - ledgerW, y1: yFor(dd), x2: NOTE_X + ledgerW, y2: yFor(dd), stroke: "#2c3e50", "stroke-width": 1.4 }));
        }

        const cy = yFor(d);
        const color = reveal === "good" ? "#27ae60" : reveal === "bad" ? "#e74c3c" : "#2c3e50";
        svg.appendChild(el("ellipse", { cx: NOTE_X, cy: cy, rx: 9.5, ry: 7, fill: color, transform: `rotate(-20 ${NOTE_X} ${cy})` }));

        if (d <= 4)
            svg.appendChild(el("line", { x1: NOTE_X + 9, y1: cy - 1, x2: NOTE_X + 9, y2: cy - GAP * 3.2, stroke: color, "stroke-width": 1.6 }));
        else
            svg.appendChild(el("line", { x1: NOTE_X - 9, y1: cy + 1, x2: NOTE_X - 9, y2: cy + GAP * 3.2, stroke: color, "stroke-width": 1.6 }));

        // Reveal the letter right beside the notehead (learning mode / after answering)
        if (reveal) {
            svg.appendChild(el("text", { x: NOTE_X + 24, y: cy + 6, "font-size": 22, "font-weight": "bold",
                "font-family": "Arial, sans-serif", fill: color }, letterAt(clef, d)));
        }
    }

    // ---- Round flow -----------------------------------------------------
    function nextNote() {
        answered = false;
        setFeedback("", "");

        if (mode === "both") currentClef = Math.random() < 0.5 ? "treble" : "bass";
        else currentClef = mode;

        currentD = pickPosition(currentClef);

        document.getElementById("clefLabel").textContent = CLEFS[currentClef].name;
        const showName = document.getElementById("hintChk").checked;
        drawStaff(currentClef, currentD, showName ? "hint" : null);
        if (showName) setFeedback("this note is " + letterAt(currentClef, currentD), "");

        keyEls.forEach(b => { b.disabled = false; b.classList.remove("flash-good", "flash-bad"); });
    }

    function setFeedback(text, kind) {
        const f = document.getElementById("feedback");
        f.textContent = text || " ";
        f.className = "feedback" + (kind ? " " + kind : "");
    }

    function answer(letter) {
        if (answered) return;
        answered = true;
        const correct = letterAt(currentClef, currentD);
        state.total++;
        keyEls.forEach(b => b.disabled = true);

        const pressedBtn = keyEls.find(b => b.dataset.letter === letter);
        const correctBtn = keyEls.find(b => b.dataset.letter === correct);
        const isRight = letter === correct;

        if (isRight) {
            state.correct++;
            state.streak++;
            if (state.streak > state.best) state.best = state.streak;
            bumpWeight(currentClef, currentD, -1);
            if (pressedBtn) pressedBtn.classList.add("flash-good");
            setFeedback("✓ " + correct, "good");
        } else {
            state.streak = 0;
            bumpWeight(currentClef, currentD, +3);
            if (pressedBtn) pressedBtn.classList.add("flash-bad");
            if (correctBtn) correctBtn.classList.add("flash-good");
            setFeedback("✗ that was " + correct, "bad");
        }

        drawStaff(currentClef, currentD, isRight ? "good" : "bad"); // reveal on the staff
        playCurrent();
        renderStats();
        saveState();
        setTimeout(nextNote, isRight ? 750 : 1350);
    }

    function renderStats() {
        document.getElementById("sAcc").textContent = state.total ? Math.round(state.correct / state.total * 100) + "%" : "—";
        document.getElementById("sStreak").textContent = state.streak;
        document.getElementById("sBest").textContent = state.best;
        document.getElementById("sTotal").textContent = state.total;
    }

    // ---- Wiring ---------------------------------------------------------
    const keysWrap = document.getElementById("keys");
    const keyEls = LETTERS.map(L => {
        const b = document.createElement("button");
        b.dataset.letter = L;
        b.textContent = L;
        b.addEventListener("click", () => answer(L));
        keysWrap.appendChild(b);
        return b;
    });

    document.getElementById("hintChk").addEventListener("change", () => {
        if (answered) return;
        const on = document.getElementById("hintChk").checked;
        drawStaff(currentClef, currentD, on ? "hint" : null);
        setFeedback(on ? "this note is " + letterAt(currentClef, currentD) : "", "");
    });

    document.getElementById("replayBtn").addEventListener("click", playCurrent);

    document.querySelectorAll("#modes button").forEach(btn => {
        btn.addEventListener("click", () => {
            document.querySelectorAll("#modes button").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            mode = btn.dataset.mode;
            nextNote();
        });
    });

    document.querySelectorAll("#diffs button").forEach(btn => {
        btn.addEventListener("click", () => {
            document.querySelectorAll("#diffs button").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            difficulty = btn.dataset.diff;
            nextNote();
        });
    });

    document.getElementById("resetBtn").addEventListener("click", () => {
        state = Object.assign({}, DEFAULT_STATE, { weights: {} });
        saveState();
        renderStats();
        nextNote();
    });

    document.addEventListener("keydown", e => {
        const k = e.key.toUpperCase();
        if (LETTERS.includes(k)) { answer(k); e.preventDefault(); }
    });

    renderStats();
    nextNote();
})();
</script>
</body>
</html>
